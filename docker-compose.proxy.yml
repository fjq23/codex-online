version: "3.8"

services:
  mihomo:
    build:
      context: ./proxy/mihomo
    restart: unless-stopped
    cpus: "${MIHOMO_CPUS:-0.25}"
    mem_limit: "${MIHOMO_MEM_LIMIT:-128m}"
    ports:
      - "127.0.0.1:${MIHOMO_HTTP_PORT}:7890"
      - "127.0.0.1:${MIHOMO_SOCKS_PORT}:7891"
      - "127.0.0.1:${MIHOMO_API_PORT}:9090"
    volumes:
      - ./proxy/mihomo:/root/.config/mihomo

  ttyd:
    depends_on:
      - mihomo
    environment:
      HTTP_PROXY: http://mihomo:7890
      HTTPS_PROXY: http://mihomo:7890
      ALL_PROXY: socks5://mihomo:7891
      NO_PROXY: localhost,127.0.0.1,caddy,ttyd,filebrowser,mihomo
      http_proxy: http://mihomo:7890
      https_proxy: http://mihomo:7890
      all_proxy: socks5://mihomo:7891
      no_proxy: localhost,127.0.0.1,caddy,ttyd,filebrowser,mihomo
