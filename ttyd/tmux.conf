# Preserve UTF-8 locale variables when tmux creates or reattaches sessions.
set-option -ag update-environment "LANG"
set-option -ag update-environment "LC_ALL"
set-option -ag update-environment "LC_CTYPE"

# Use a predictable 256-color terminfo inside tmux and keep RGB colors when
# the browser terminal reports xterm-256color.
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
