services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - ttyd
      - filebrowser
    environment:
      CADDY_SITE_ADDR: ${CADDY_SITE_ADDR:-:80}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/site:ro
      - ./data/caddy:/data
      - ./data/caddy_config:/config

  ttyd:
    build:
      context: ./ttyd
      args:
        CODEX_VERSION: ${CODEX_VERSION:-0.116.0}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_UID: ${APP_UID:-1000}
      APP_GID: ${APP_GID:-1000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_HOME: /codex-home
      WORKSPACE_DIR: /workspace
      WORKSPACES_DIR: /workspace/workspaces
      STATE_DIR: /workspace/.state
      TMUX_SESSION_PREFIX: ${TMUX_SESSION_PREFIX:-ws}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,caddy,ttyd,filebrowser,mihomo}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      all_proxy: ${ALL_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,caddy,ttyd,filebrowser,mihomo}
    volumes:
      - ./bin:/opt/codex-workbench/bin:ro
      - ./api:/opt/codex-workbench/api:ro
      - ./workspace:/workspace
      - ./data/codex-home:/codex-home
    expose:
      - "7681"
      - "8081"

  filebrowser:
    image: filebrowser/filebrowser:v2.43.0
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      FB_ADDRESS: 0.0.0.0
      FB_PORT: 80
      FB_ROOT: /srv/workspaces
      FB_DATABASE: /database/filebrowser.db
      FB_BASEURL: /files
      FB_NOAUTH: "true"
      FB_DISABLE_EXEC: "true"
      FB_LOG: stdout
    volumes:
      - ./workspace:/srv
      - ./data/filebrowser:/database
    expose:
      - "80"
