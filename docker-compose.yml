version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    cpus: "${CADDY_CPUS:-0.25}"
    mem_limit: "${CADDY_MEM_LIMIT:-128m}"
    depends_on:
      - ttyd
      - filebrowser
    environment:
      CADDY_SITE_ADDR: ${CADDY_SITE_ADDR}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/site:ro
      - ./data/caddy:/data
      - ./data/caddy_config:/config

  ttyd:
    build:
      context: ./ttyd
      args:
        CODEX_VERSION: ${CODEX_VERSION}
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        ALL_PROXY: ${ALL_PROXY}
        NO_PROXY: ${NO_PROXY}
    restart: unless-stopped
    cpus: "${TTYD_CPUS:-1.25}"
    mem_limit: "${TTYD_MEM_LIMIT:-1536m}"
    environment:
      TZ: ${TZ}
      APP_UID: ${APP_UID}
      APP_GID: ${APP_GID}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CODEX_HOME: /codex-home
      WORKSPACE_DIR: /workspace
      WORKSPACES_DIR: /workspace/workspaces
      STATE_DIR: /workspace/.state
      TMUX_SESSION_PREFIX: ${TMUX_SESSION_PREFIX}
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      ALL_PROXY: ${ALL_PROXY}
      NO_PROXY: ${NO_PROXY}
      http_proxy: ${HTTP_PROXY}
      https_proxy: ${HTTPS_PROXY}
      all_proxy: ${ALL_PROXY}
      no_proxy: ${NO_PROXY}
    volumes:
      - ./bin:/opt/codex-workbench/bin:ro
      - ./api:/opt/codex-workbench/api:ro
      - ./workspace:/workspace
      - ./data/codex-home:/codex-home
    expose:
      - "7681"
      - "8081"

  filebrowser:
    image: filebrowser/filebrowser:v2.43.0
    restart: unless-stopped
    cpus: "${FILEBROWSER_CPUS:-0.25}"
    mem_limit: "${FILEBROWSER_MEM_LIMIT:-256m}"
    user: "${APP_UID}:${APP_GID}"
    environment:
      TZ: ${TZ}
      FB_ADDRESS: 0.0.0.0
      FB_PORT: 80
      FB_ROOT: /srv/workspaces
      FB_DATABASE: /database/filebrowser.db
      FB_BASEURL: /files
      FB_NOAUTH: "true"
      FB_DISABLE_EXEC: "true"
      FB_LOG: stdout
    volumes:
      - ./workspace:/srv
      - ./data/filebrowser:/database
    expose:
      - "80"
