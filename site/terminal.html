<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>Terminal</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="terminal-page">
    <main class="terminal-shell">
      <header class="terminal-topbar">
        <div class="terminal-titleblock">
          <p class="eyebrow">Terminal</p>
          <h1 id="terminal-workspace">Loading workspace...</h1>
          <div class="terminal-system" aria-label="server status">
            <span id="terminal-system-cpu">CPU --</span>
            <span id="terminal-system-memory">Mem --</span>
            <span id="terminal-system-disk">Disk --</span>
            <span id="terminal-system-load">Load --</span>
          </div>
        </div>
        <nav class="terminal-nav" aria-label="terminal navigation">
          <button class="toolbar-link toolbar-button" id="sync-terminal" type="button">Sync</button>
          <a class="toolbar-link" href="/">Home</a>
          <a class="toolbar-link" href="/files/">Files</a>
        </nav>
      </header>

      <section class="terminal-frame-shell panel" id="terminal-frame-shell">
        <iframe
          id="terminal-frame"
          class="terminal-frame"
          src="/terminal/session/"
          title="Codex terminal"
          loading="eager"
        ></iframe>
      </section>

      <section class="terminal-keys panel" aria-label="mobile extra keys">
        <div class="panel-header terminal-keys-header">
          <h2>Keyboard Bar</h2>
          <span id="terminal-key-status">Ready</span>
        </div>
        <div class="key-strip" id="key-strip"></div>
      </section>
    </main>

    <script src="/terminal.js"></script>
  </body>
</html>
